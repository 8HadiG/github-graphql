query (
  $getIssueCount: Boolean! = false
  $getPageInfo: Boolean! = false
  $getPushedAt: Boolean! = false
  $getStargazerCount: Boolean! = false
  $getUrl: Boolean! = false
  $searchAfter: String = null
  $searchFirst: Int! = 1
  $searchQuery: String! = ""
  $searchType: SearchType! = ISSUE
) {
  search(
    after: $searchAfter
    first: $searchFirst
    query: $searchQuery
    type: $searchType
  ) {
    issueCount @include(if: $getIssueCount)
    nodes {
      ... on Issue {
        url @include(if: $getUrl)
        repository {
          stargazerCount @include(if: $getStargazerCount)
          pushedAt @include(if: $getPushedAt)
        }
      }
    }
    pageInfo @include(if: $getPageInfo) {
      hasNextPage
      endCursor
    }
  }
  rateLimit {
    cost
    remaining
    limit
    used
    resetAt
  }
}
